<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>LoreRelay Player</title>
  <link rel="stylesheet" href="player.css" />
</head>
<body>
  <div id="app">
    <header id="top-bar">
      <div class="brand">⚔️ LoreRelay</div>
      <div id="conn-status" class="status-dot offline" title="Connection"></div>
    </header>

    <section id="status-panel" class="hidden"></section>

    <section id="map-panel" class="hidden">
      <button id="map-toggle" type="button" aria-expanded="false" aria-controls="map-body">
        <span id="map-toggle-label">🗺️ Map</span>
        <span id="map-toggle-count"></span>
        <span id="map-toggle-chevron" aria-hidden="true">▸</span>
      </button>
      <div id="map-body" class="hidden">
        <div id="map-canvas-wrap">
          <canvas id="map-canvas"></canvas>
          <div id="map-tooltip" class="hidden"></div>
        </div>
        <div id="map-legend"></div>
      </div>
    </section>

    <main id="chat-log" aria-live="polite"></main>

    <section id="game-over" class="hidden">
      <p id="game-over-msg"></p>
    </section>

    <section id="options-panel" class="hidden"></section>

    <footer id="input-panel">
      <div id="busy-banner" class="hidden">GM is thinking…</div>
      <form id="input-form">
        <input id="player-input" type="text" autocomplete="off" placeholder="Your action…" maxlength="2000" />
        <button id="send-btn" type="submit">Send</button>
      </form>
    </footer>
  </div>
  <script src="player.js"></script>
</body>
</html>
